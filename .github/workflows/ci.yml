name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read

# Per-extension test matrix (intentional-drift). Security/quality jobs are in checks.yml.
jobs:
  ci:
    uses: netresearch/typo3-ci-workflows/.github/workflows/ci.yml@main
    permissions:
      contents: read
    with:
      php-versions: '["8.3","8.4","8.5"]'
      typo3-versions: '["^14.3"]'
      run-cgl: false
      run-phpstan: false
      run-rector: false
      run-unit-tests: true
      unit-test-command: '.Build/bin/phpunit -c Build/phpunit/UnitTests.xml'
      run-functional-tests: false
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
