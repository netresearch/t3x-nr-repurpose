name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 6 * * 1'

permissions: {}

# CodeQL is covered by the repository's default code-scanning setup, so no advanced
# CodeQL job here (an advanced workflow conflicts with default setup). Reusable-workflow
# refs are pinned to a commit SHA (this repo enforces sha_pinning_required).
jobs:
  ci:
    uses: netresearch/typo3-ci-workflows/.github/workflows/ci.yml@bb859ede3f062f9259676311fc386a5553bae207 # main
    permissions:
      contents: read
    with:
      # nr_repurpose requires PHP ^8.3 and is TYPO3 v14.3-only.
      php-versions: '["8.3","8.4","8.5"]'
      typo3-versions: '["^14.3"]'
      # No PHP-CS-Fixer / PHPStan / Rector config in this extension yet.
      run-cgl: false
      run-phpstan: false
      run-rector: false
      run-unit-tests: true
      unit-test-command: '.Build/bin/phpunit -c Build/phpunit/UnitTests.xml'
      # Functional tests run locally via Build/Scripts/runTests.sh -s functional (SQLite),
      # matching nr-llm — they need a TYPO3 instance the CI test job doesn't provision here.
      run-functional-tests: false

  security:
    uses: netresearch/typo3-ci-workflows/.github/workflows/security.yml@bb859ede3f062f9259676311fc386a5553bae207 # main
    permissions:
      contents: read
      security-events: write

  license-check:
    uses: netresearch/typo3-ci-workflows/.github/workflows/license-check.yml@bb859ede3f062f9259676311fc386a5553bae207 # main
    permissions:
      contents: read
