name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions: {}

jobs:
  ci:
    uses: netresearch/typo3-ci-workflows/.github/workflows/ci.yml@f61237eecfafb5559d8eb37e8007389cf65bc5f9 # main
    permissions:
      contents: read
    with:
      php-versions: '["8.3","8.4","8.5"]'
      typo3-versions: '["^14.3"]'
      run-cgl: false
      run-phpstan: false
      run-rector: false
      run-unit-tests: true
      unit-test-command: '.Build/bin/phpunit -c Build/phpunit/UnitTests.xml'
      run-functional-tests: false
