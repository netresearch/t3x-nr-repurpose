name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  schedule:
    - cron: '0 6 * * 1'

permissions: {}

# Reusable workflow refs are pinned to a full commit SHA (this repo enforces
# sha_pinning_required); the trailing comment records the human-readable ref.
jobs:
  ci:
    uses: netresearch/typo3-ci-workflows/.github/workflows/ci.yml@f61237eecfafb5559d8eb37e8007389cf65bc5f9 # main
    permissions:
      contents: read
    with:
      # nr_repurpose requires PHP ^8.3 and is TYPO3 v14.3-only.
      php-versions: '["8.3","8.4","8.5"]'
      typo3-versions: '["^14.3"]'
      # No PHP-CS-Fixer / PHPStan / Rector config in this extension yet.
      run-cgl: false
      run-phpstan: false
      run-rector: false
      run-unit-tests: true
      unit-test-command: '.Build/bin/phpunit -c Build/phpunit/UnitTests.xml'
      # Functional tests run locally via Build/Scripts/runTests.sh -s functional (sqlite),
      # matching nr-llm's convention — they need a TYPO3 instance/DB the CI test job doesn't
      # provision for this extension. Keep CI focused on lint + unit.
      run-functional-tests: false

  security:
    uses: netresearch/typo3-ci-workflows/.github/workflows/security.yml@f61237eecfafb5559d8eb37e8007389cf65bc5f9 # main
    permissions:
      contents: read
      security-events: write

  license-check:
    uses: netresearch/typo3-ci-workflows/.github/workflows/license-check.yml@f61237eecfafb5559d8eb37e8007389cf65bc5f9 # main
    permissions:
      contents: read

  codeql:
    uses: netresearch/.github/.github/workflows/codeql.yml@8bf8b33a7c8865830f9b5ce787a67c2a209d7afe # main
    permissions:
      contents: read
      security-events: write
      actions: read

  scorecard:
    if: github.event_name == 'schedule' || (github.event_name == 'push' && github.ref_name == github.event.repository.default_branch)
    uses: netresearch/.github/.github/workflows/scorecard.yml@8bf8b33a7c8865830f9b5ce787a67c2a209d7afe # main
    permissions:
      contents: read
      security-events: write
      id-token: write
