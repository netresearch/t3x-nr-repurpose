name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    uses: netresearch/typo3-ci-workflows/.github/workflows/release-typo3-extension.yml@f61237eecfafb5559d8eb37e8007389cf65bc5f9 # main
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      archive-prefix: nr-repurpose
      package-name: netresearch/nr-repurpose
      extension-key: nr_repurpose
      # The extension is not yet published to TER, Packagist or
      # docs.typo3.org — the verification jobs would poll forever.
      # Drop these once the respective publication exists.
      skip-ter: true
      skip-packagist: true
      skip-docs: true
