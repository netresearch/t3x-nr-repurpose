name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    uses: netresearch/typo3-ci-workflows/.github/workflows/release-typo3-extension.yml@main
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      archive-prefix: 'nr-repurpose'
      package-name: 'netresearch/nr-repurpose'
      extension-key: 'nr_repurpose'
      # Not published to TER/Packagist/docs yet — build + sign the GitHub release only.
      # (Restored after the CI-template adoption dropped these; the token preflight
      # otherwise hard-fails the release when no TER token is configured.)
      skip-ter: true
      skip-packagist: true
      skip-docs: true
    secrets:
      TYPO3_TER_ACCESS_TOKEN: ${{ secrets.TYPO3_TER_ACCESS_TOKEN }}
