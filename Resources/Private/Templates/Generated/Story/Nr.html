<f:spaceless>
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@600;700&family=Open+Sans:wght@400;600&display=swap');
        html, body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1920px;
            <f:if condition="{transparent}">
                <f:then>background: transparent;</f:then>
                <f:else>background: linear-gradient(160deg, #2F99A4 0%, #0f3f44 100%);</f:else>
            </f:if>
        }
        .story {
            position: relative;
            box-sizing: border-box;
            width: 1080px;
            height: 1920px;
            padding: 120px 96px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            color: #ffffff;
            font-family: 'Open Sans', -apple-system, 'Segoe UI', Roboto, sans-serif;
        }
        .story__indicator {
            position: absolute;
            top: 96px;
            right: 96px;
            font-family: 'Raleway', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 600;
            font-size: 32px;
            letter-spacing: 1px;
            opacity: 0.85;
        }
        .story__accent { width: 120px; height: 12px; background: #FF4D00; margin-bottom: 40px; }
        .story__headline {
            font-family: 'Raleway', 'Helvetica Neue', Arial, sans-serif;
            font-weight: 700;
            font-size: <f:if condition="{role} == 'cover'"><f:then>116px</f:then><f:else>88px</f:else></f:if>;
            line-height: 1.1;
            margin: 0 0 32px;
        }
        .story__subline { font-size: 40px; line-height: 1.4; font-weight: 400; margin: 0; }
        .story__source { font-size: 30px; line-height: 1.4; font-weight: 400; margin: 48px 0 0; opacity: 0.8; word-break: break-all; }
        .story__brand { margin-top: 64px; font-family: 'Raleway', sans-serif; font-weight: 600; font-size: 28px; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="story">
        <div class="story__indicator">{slideIndex}/{slideTotal}</div>
        <div class="story__accent"></div>
        <h1 class="story__headline">{headline}</h1>
        <p class="story__subline">{subline}</p>
        <f:if condition="{role} == 'outro'">
            <p class="story__source">{sourceLabel}</p>
        </f:if>
        <div class="story__brand">Netresearch DTT GmbH</div>
    </div>
</body>
</html>
</f:spaceless>
