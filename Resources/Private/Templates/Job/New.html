<html data-namespace-typo3-fluid="true" xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers">
<f:layout name="Module" />
<f:section name="Content">
    <h1><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.title" /></h1>

    <f:form action="create" name="newJob" object="{newJob}">
        <div class="form-group">
            <label class="form-label" for="nrrepurpose-sourceType">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.field.sourceType" />
            </label>
            <f:form.select property="sourceType" id="nrrepurpose-sourceType" class="form-select"
                options="{
                    url: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:sourceType.url\')}',
                    pdf_url: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:sourceType.pdf_url\')}',
                    pdf_fal: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:sourceType.pdf_fal\')}'
                }" />
        </div>

        <div class="form-group">
            <label class="form-label" for="nrrepurpose-sourceValue">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.field.sourceValue" />
            </label>
            <f:form.textfield property="sourceValue" id="nrrepurpose-sourceValue" class="form-control"
                placeholder="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.field.sourceValue.placeholder')}" />
        </div>

        <div class="form-group">
            <label class="form-label" for="nrrepurpose-pdfMode">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.field.pdfMode" />
            </label>
            <f:form.select property="pdfMode" id="nrrepurpose-pdfMode" class="form-select"
                options="{
                    auto: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:pdfMode.auto\')}',
                    text: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:pdfMode.text\')}',
                    vision: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:pdfMode.vision\')}',
                    tables: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:pdfMode.tables\')}'
                }" />
        </div>

        <p class="text-muted">
            <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.hint.pdfFal" />
        </p>

        <div class="form-group">
            <label class="form-label" for="nrrepurpose-theme">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.field.theme" />
            </label>
            <f:form.select property="theme" id="nrrepurpose-theme" class="form-select"
                options="{
                    nr: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:theme.nr\')}',
                    neutral: '{f:translate(key: \'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:theme.neutral\')}'
                }" />
        </div>

        <f:comment><!--
            Prompt-snippet selectors (nr_llm PromptSnippet library). Audience and tone steer
            every artifact; the per-artifact selectors live inside the artifact cards below.
            All optional — "(none)" keeps the previous, snippet-free prompts.
        --></f:comment>
        <div class="form-group">
            <label class="form-label" for="nrrepurpose-snippetAudience">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.audience" />
            </label>
            <f:form.select name="snippetAudience" id="nrrepurpose-snippetAudience" class="form-select"
                options="{audienceOptions}"
                prependOptionLabel="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.none')}"
                prependOptionValue="0" />
        </div>

        <div class="form-group">
            <label class="form-label" for="nrrepurpose-snippetTone">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.tone" />
            </label>
            <f:form.select name="snippetTone" id="nrrepurpose-snippetTone" class="form-select"
                options="{toneOptions}"
                prependOptionLabel="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.none')}"
                prependOptionValue="0" />
        </div>

        <fieldset class="form-group">
            <legend class="form-label">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.section.artifacts" />
            </legend>
            <div class="row g-3">
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="form-check">
                                <f:form.checkbox property="wantPodcast" value="1" checked="true" id="nrrepurpose-wantPodcast" class="form-check-input" />
                                <label class="form-check-label fw-bold" for="nrrepurpose-wantPodcast">
                                    <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:artifact.podcast" />
                                </label>
                            </div>
                            <p class="card-text text-muted small">
                                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:artifact.podcast.desc" />
                            </p>
                            <f:for each="{1: '1', 2: '2', 3: '3'}" as="slot" key="slotIndex">
                                <div class="form-group mb-2">
                                    <label class="form-label" for="nrrepurpose-snippetPersona{slot}">
                                        <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.persona" arguments="{0: slot}" />
                                    </label>
                                    <f:form.select name="snippetPersona{slot}" id="nrrepurpose-snippetPersona{slot}" class="form-select"
                                        options="{personaOptions}"
                                        prependOptionLabel="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.none')}"
                                        prependOptionValue="0" />
                                </div>
                            </f:for>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="form-check">
                                <f:form.checkbox property="wantSchaubild" value="1" checked="true" id="nrrepurpose-wantSchaubild" class="form-check-input" />
                                <label class="form-check-label fw-bold" for="nrrepurpose-wantSchaubild">
                                    <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:artifact.schaubild" />
                                </label>
                            </div>
                            <p class="card-text text-muted small">
                                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:artifact.schaubild.desc" />
                            </p>
                            <div class="form-group mb-2">
                                <label class="form-label" for="nrrepurpose-snippetSchaubildLayout">
                                    <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.layout" />
                                </label>
                                <f:form.select name="snippetSchaubildLayout" id="nrrepurpose-snippetSchaubildLayout" class="form-select"
                                    options="{layoutOptions}"
                                    prependOptionLabel="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.none')}"
                                    prependOptionValue="0" />
                            </div>
                            <div class="form-group mb-2">
                                <label class="form-label" for="nrrepurpose-snippetSchaubildStyle">
                                    <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.style" />
                                </label>
                                <f:form.select name="snippetSchaubildStyle" id="nrrepurpose-snippetSchaubildStyle" class="form-select"
                                    options="{styleOptions}"
                                    prependOptionLabel="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.none')}"
                                    prependOptionValue="0" />
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card h-100">
                        <div class="card-body">
                            <div class="form-check">
                                <f:form.checkbox property="wantStory" value="1" checked="true" id="nrrepurpose-wantStory" class="form-check-input" />
                                <label class="form-check-label fw-bold" for="nrrepurpose-wantStory">
                                    <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:artifact.story" />
                                </label>
                            </div>
                            <p class="card-text text-muted small">
                                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:artifact.story.desc" />
                            </p>
                            <div class="form-group mb-2">
                                <label class="form-label" for="nrrepurpose-snippetStoryLayout">
                                    <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.layout" />
                                </label>
                                <f:form.select name="snippetStoryLayout" id="nrrepurpose-snippetStoryLayout" class="form-select"
                                    options="{layoutOptions}"
                                    prependOptionLabel="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.none')}"
                                    prependOptionValue="0" />
                            </div>
                            <div class="form-group mb-2">
                                <label class="form-label" for="nrrepurpose-snippetStoryStyle">
                                    <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.style" />
                                </label>
                                <f:form.select name="snippetStoryStyle" id="nrrepurpose-snippetStoryStyle" class="form-select"
                                    options="{styleOptions}"
                                    prependOptionLabel="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.snippet.none')}"
                                    prependOptionValue="0" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </fieldset>

        <p>
            <button type="submit" class="btn btn-primary" id="nrrepurpose-submit"
                    data-submitting-label="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.submitting')}">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.submit" />
            </button>
            <f:link.action action="list" class="btn btn-default">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:new.cancel" />
            </f:link.action>
        </p>
    </f:form>

    <f:comment><!--
        Immediate click feedback: disable the submit button and show a busy label
        while the form posts, so the editor sees the click registered even when
        the round-trip takes a moment. Plain inline module, no dependencies.
    --></f:comment>
    <script>
        (function () {
            const form = document.querySelector('form[name="newJob"]');
            const button = document.getElementById('nrrepurpose-submit');
            if (!form || !button) {
                return;
            }
            form.addEventListener('submit', function () {
                // Defer past the submit dispatch: disabling the triggering button
                // synchronously can cancel the submission in some browsers (Safari).
                setTimeout(function () {
                    button.disabled = true;
                    button.setAttribute('aria-busy', 'true');
                    const spinner = document.createElement('span');
                    spinner.className = 'spinner-border spinner-border-sm';
                    spinner.setAttribute('role', 'status');
                    spinner.setAttribute('aria-hidden', 'true');
                    // textContent path (not innerHTML): the label is an overridable
                    // XLF string and must never become an HTML injection point.
                    button.replaceChildren(spinner, document.createTextNode(' ' + button.dataset.submittingLabel));
                }, 0);
            });
        })();
    </script>
</f:section>
</html>
