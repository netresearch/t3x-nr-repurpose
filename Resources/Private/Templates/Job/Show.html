<html data-namespace-typo3-fluid="true"
      xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:nr="http://typo3.org/ns/Netresearch/NrRepurpose/ViewHelpers">
<f:layout name="Module" />
<f:section name="Content">
    <h1><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.title" arguments="{0: job.uid}" /></h1>

    <dl class="row">
        <dt class="col-sm-2"><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.field.source" /></dt>
        <dd class="col-sm-10">{job.sourceValue}</dd>

        <dt class="col-sm-2"><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.field.status" /></dt>
        <dd class="col-sm-10">
            <span class="badge badge-{job.statusEnum.severity}">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:{job.statusEnum.labelKey}" />
            </span>
            <span class="text-muted">({job.progress}%)<f:if condition="{job.currentStep}"> — {job.currentStep}</f:if></span>
        </dd>

        <f:if condition="{job.languageDetected}">
            <dt class="col-sm-2"><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.field.language" /></dt>
            <dd class="col-sm-10">{job.languageDetected}</dd>
        </f:if>

        <f:if condition="{job.errorMessage}">
            <dt class="col-sm-2"><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.field.error" /></dt>
            <dd class="col-sm-10 text-danger">{job.errorMessage}</dd>
        </f:if>
    </dl>

    <f:if condition="!{job.statusEnum.terminal}">
        <div class="callout callout-info">
            <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.running.notice" />
            <f:link.action action="show" arguments="{job: job}" class="btn btn-sm btn-default ms-2">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.action.reload" />
            </f:link.action>
        </div>
    </f:if>

    <h2><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.section.artifacts" /></h2>

    <f:if condition="{job.artifacts}">
        <f:then>
            <f:for each="{job.artifacts}" as="artifact">
                <div class="card mb-3">
                    <div class="card-header">
                        <h3 class="h5 mb-0 d-inline">
                            <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:artifact.{artifact.type}" />
                            <f:if condition="{artifact.variant} != 'default'"> — {artifact.variant}</f:if>
                        </h3>
                        <span class="badge badge-{artifact.statusEnum.severity}">
                            <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:{artifact.statusEnum.labelKey}" />
                        </span>
                    </div>
                    <div class="card-body">
                        <f:if condition="{artifact.errorMessage}">
                            <p class="text-danger">{artifact.errorMessage}</p>
                        </f:if>

                        <f:if condition="{artifact.status} == 'done'">
                            <f:comment><!-- Podcast: audio player + subtitles + transcript --></f:comment>
                            <f:if condition="{artifact.type} == 'podcast'">
                                <f:variable name="mp3" value="{nr:publicUrl(fileUid: artifact.fileUid)}" />
                                <f:variable name="vtt" value="{nr:publicUrl(fileUid: artifact.subtitleFileUid)}" />
                                <f:if condition="{mp3}">
                                    <audio controls preload="metadata" style="width: 100%; max-width: 640px;">
                                        <source src="{mp3}" type="audio/mpeg" />
                                        <f:if condition="{vtt}">
                                            <track kind="subtitles" src="{vtt}" srclang="{job.languageDetected}"
                                                   label="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.podcast.subtitleLabel')}" default="default" />
                                        </f:if>
                                    </audio>
                                    <p class="mt-2">
                                        <a href="{mp3}" download class="btn btn-sm btn-default">
                                            <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.download.mp3" />
                                        </a>
                                        <f:if condition="{vtt}">
                                            <a href="{vtt}" download class="btn btn-sm btn-default">
                                                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.download.vtt" />
                                            </a>
                                        </f:if>
                                    </p>
                                </f:if>
                                <f:if condition="{artifact.scriptText}">
                                    <details>
                                        <summary><f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.podcast.transcript" /></summary>
                                        <pre style="white-space: pre-wrap;">{artifact.scriptText}</pre>
                                    </details>
                                </f:if>
                            </f:if>

                            <f:comment><!-- Schaubild + Story: image preview + download --></f:comment>
                            <f:if condition="{artifact.type} != 'podcast'">
                                <f:variable name="img" value="{nr:publicUrl(fileUid: artifact.fileUid)}" />
                                <f:if condition="{img}">
                                    <p>
                                        <img src="{img}"
                                             alt="{f:translate(key: 'LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.preview.alt', arguments: {0: artifact.type, 1: artifact.variant})}"
                                             style="max-width: 100%; max-height: 480px; border: 1px solid #ccc;" />
                                    </p>
                                    <p>
                                        <a href="{img}" download class="btn btn-sm btn-default">
                                            <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.download.png" />
                                        </a>
                                    </p>
                                </f:if>
                            </f:if>
                        </f:if>
                    </div>
                </div>
            </f:for>
        </f:then>
        <f:else>
            <div class="callout callout-info">
                <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.artifacts.empty" />
            </div>
        </f:else>
    </f:if>

    <p>
        <f:link.action action="list" class="btn btn-default">
            <f:translate key="LLL:EXT:nr_repurpose/Resources/Private/Language/locallang.xlf:show.action.back" />
        </f:link.action>
    </p>
</f:section>
</html>
