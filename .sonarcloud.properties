# SonarQube Cloud — Automatic Analysis configuration.
#
# This file (NOT sonar-project.properties, which Automatic Analysis ignores)
# scopes SonarCloud's Automatic Analysis from the repository.
# Mirrors the sibling extension nr-llm's configuration.

# Exclude from ALL analysis:
#  - Fluid templates/partials: TYPO3 view files wrapped in `<html xmlns:f="...">`
#    only to declare ViewHelper namespaces — they are NOT standalone HTML pages,
#    so SonarCloud's Web rules (DOCTYPE / lang attribute / <title>) are false
#    positives on them.
sonar.exclusions=Resources/Private/Templates/**,Resources/Private/Partials/**

# Exclude from copy-paste / duplication detection:
#  - Fluid templates (as above).
#  - XLIFF translation files — the EN source and DE target files necessarily
#    mirror each other's structure; that is translation, not duplication.
#  - Test code — repeated arrange/act/assert scaffolding is idiomatic in tests.
#  - TYPO3 TCA files — declarative arrays whose shape is dictated by the TCA
#    schema; the repetition is the format, not copy-paste.
sonar.cpd.exclusions=Resources/Private/Templates/**,Resources/Private/Partials/**,Resources/Private/Language/**,Tests/**,Configuration/TCA/**
