services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  Netresearch\NrRepurpose\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'
      - '../Classes/Queue/Message/*'

  # nr_llm aliases CapabilityPermissionServiceInterface privately; expose it publicly
  # here so it can be autowired once capability gating is added.
  Netresearch\NrLlm\Service\CapabilityPermissionServiceInterface:
    alias: Netresearch\NrLlm\Service\CapabilityPermissionService
    public: true

  # Public so functional tests can fetch them via $this->get().
  Netresearch\NrRepurpose\Persistence\JobProcessingRepository:
    public: true
  Netresearch\NrRepurpose\Resource\JobFileStorage:
    public: true

  Netresearch\NrRepurpose\Service\GenerationOrchestrator:
    arguments:
      $generators: !tagged_iterator nr_repurpose.artifact_generator

  # Public so functional tests can fetch the real resolver via $this->get().
  Netresearch\NrRepurpose\Pipeline\PromptSnippetResolver:
    public: true

  Netresearch\NrRepurpose\Service\GenerationOrchestratorInterface:
    alias: Netresearch\NrRepurpose\Service\GenerationOrchestrator
    public: true

  Netresearch\NrRepurpose\Understanding\DocumentAnalyzerInterface:
    alias: Netresearch\NrRepurpose\Understanding\DocumentAnalyzer

  # Render-infra (Plan 4): process boundary + the three primitives. The implementations'
  # constructor defaults (node/ffmpeg/ffprobe on PATH, chromium at /usr/bin/chromium,
  # render.cjs resolved relative to the extension, temp work dirs) need no explicit scalars.
  Netresearch\NrRepurpose\Rendering\Process\ProcessRunnerInterface:
    alias: Netresearch\NrRepurpose\Rendering\Process\SymfonyProcessRunner

  Netresearch\NrRepurpose\Rendering\HtmlToImageRendererInterface:
    alias: Netresearch\NrRepurpose\Rendering\PlaywrightHtmlToImageRenderer

  Netresearch\NrRepurpose\Rendering\ImageCompositorInterface:
    alias: Netresearch\NrRepurpose\Rendering\GdImageCompositor

  Netresearch\NrRepurpose\Rendering\AudioStitcherInterface:
    alias: Netresearch\NrRepurpose\Rendering\FfmpegAudioStitcher

  # Generators (Plan 5): provider-agnostic adapter over nr-llm's final Specialized services.
  Netresearch\NrRepurpose\Generator\Speech\SpeechSynthesizerInterface:
    alias: Netresearch\NrRepurpose\Generator\Speech\OpenAiSpeechSynthesizer

  Netresearch\NrRepurpose\Generator\Image\ImageGeneratorInterface:
    alias: Netresearch\NrRepurpose\Generator\Image\DallEImageGenerator

  # The orchestrator's generator set = exactly the services carrying this tag (tagged
  # explicitly, no _instanceof) so the walking-skeleton StubArtifactGenerator (auto-registered,
  # untagged) is NOT part of it. public:true lets the registration test fetch them.
  Netresearch\NrRepurpose\Generator\PodcastGenerator:
    public: true
    tags: ['nr_repurpose.artifact_generator']
  Netresearch\NrRepurpose\Generator\SchaubildGenerator:
    public: true
    tags: ['nr_repurpose.artifact_generator']
  Netresearch\NrRepurpose\Generator\StoryGenerator:
    public: true
    tags: ['nr_repurpose.artifact_generator']

  # Core registers the PSR-18 client (ClientInterface) but not the PSR-17 request factory.
  Psr\Http\Message\RequestFactoryInterface:
    class: GuzzleHttp\Psr7\HttpFactory

  Netresearch\NrRepurpose\Ingestion\PdfFileResolver:
    public: true

  Netresearch\NrRepurpose\Ingestion\Poppler\PopplerRunnerInterface:
    alias: Netresearch\NrRepurpose\Ingestion\Poppler\SymfonyProcessPopplerRunner

  Netresearch\NrRepurpose\Ingestion\SourceIngestionServiceInterface:
    alias: Netresearch\NrRepurpose\Ingestion\SourceIngestionService
    public: true

  Netresearch\NrRepurpose\Command\GenerateCommand:
    public: true
