services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  _instanceof:
    Netresearch\NrRepurpose\Generator\ArtifactGeneratorInterface:
      tags: ['nr_repurpose.artifact_generator']

  Netresearch\NrRepurpose\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'
      - '../Classes/Queue/Message/*'

  # nr_llm aliases CapabilityPermissionServiceInterface privately; expose it publicly
  # here so it can be autowired once capability gating is added.
  Netresearch\NrLlm\Service\CapabilityPermissionServiceInterface:
    alias: Netresearch\NrLlm\Service\CapabilityPermissionService
    public: true

  # Public so functional tests can fetch them via $this->get().
  Netresearch\NrRepurpose\Persistence\JobProcessingRepository:
    public: true
  Netresearch\NrRepurpose\Resource\JobFileStorage:
    public: true

  Netresearch\NrRepurpose\Service\GenerationOrchestrator:
    arguments:
      $generators: !tagged_iterator nr_repurpose.artifact_generator

  Netresearch\NrRepurpose\Service\GenerationOrchestratorInterface:
    alias: Netresearch\NrRepurpose\Service\GenerationOrchestrator
    public: true

  # Core registers the PSR-18 client (ClientInterface) but not the PSR-17 request factory.
  Psr\Http\Message\RequestFactoryInterface:
    class: GuzzleHttp\Psr7\HttpFactory

  Netresearch\NrRepurpose\Ingestion\PdfFileResolver:
    public: true
